[project]
name = "kentro-server"
version = "0.0.0"
description = "Kentro engine — FastAPI server holding all state and business logic. Same binary runs locally, in Colab, and in production."
requires-python = ">=3.13"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Kentro AI Labs" }]
dependencies = [
    "kentro",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlmodel>=0.0.22",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "typer[all]>=0.13",
    "rich>=13.9",
    "instructor>=1.7",
    "httpx>=0.27",
    "anthropic>=0.97",
    "google-genai>=1.74",
    "mcp>=1.0",
    "alembic>=1.13",
]

[project.scripts]
kentro-server = "kentro_server.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kentro_server"]
