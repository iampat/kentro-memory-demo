[project]
name = "kentro"
version = "0.0.0"
description = "Kentro SDK — thin HTTP client for kentro-server. Pydantic types, Jupyter/Colab visualization helpers."
requires-python = ">=3.13"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Kentro AI Labs" }]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kentro"]
